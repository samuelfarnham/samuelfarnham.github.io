<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sam Farnham</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='50' font-size='52'%3E%E2%9C%A6%3C/text%3E%3C/svg%3E" />
  <script>
    (function () {
      var path = window.location.pathname.replace(/\/+$/, "") || "/";
      var redirects = {
        "/about": "/",
        "/marketing": "/",
        "/marketing/rga-campaigns": "/",
        "/photography": "/",
        "/photography/portraits": "/",
        "/photography/aerial": "/",
        "/photography/on-the-ground": "/",
        "/prints": "/",
        "/localoutreach": "/"
      };
      if (redirects[path]) {
        window.location.replace(redirects[path]);
      }
    })();
  </script>
  <style>
    :root {
      --bg: #fafaf7;
      --ink: #1a1a1a;
      --muted: #6b6b6b;
      --accent: #1d4ed8;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111111;
        --ink: #ededed;
        --muted: #9a9a9a;
        --accent: #6ea8ff;
      }
    }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", system-ui, sans-serif;
      font-size: 17px;
      line-height: 1.6;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    main { max-width: 480px; text-align: center; }
    h1 {
      font-size: 24px;
      font-weight: 600;
      margin: 0 0 12px;
    }
    p { color: var(--muted); margin: 0 0 24px; }
    a {
      color: var(--ink);
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    a:hover { color: var(--accent); }
  </style>
</head>
<body>
  <main>
    <h1>Page not found</h1>
    <p>That page has either moved or never existed.</p>
    <p><a href="/">Return to samfarnham.com</a></p>
  </main>
</body>
</html>
